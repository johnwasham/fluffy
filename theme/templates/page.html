{% extends "base.html" %}

{% block title %}{{ page.title }} &mdash; {{ config.title }}{% endblock %}

{% block content %}

{% if page.hero_image %}
<section class="hero is-medium" style="background-image: url('{{ config.base_url }}{{ page.hero_image }}'); background-size: cover; background-position: center;">
  <div class="hero-body" style="background: rgba(0,0,0,0.35);">
    <div class="container has-text-centered">
      <p class="title has-text-white">{{ page.title }}</p>
    </div>
  </div>
</section>
{% endif %}

<section class="section">
  <div class="container">
    <div class="columns is-centered">
      <div class="column is-7">
        {% if not page.hero_image %}<h1 class="title">{{ page.title }}</h1>{% endif %}
        <div class="content">{{ page.html | safe }}</div>
      </div>
    </div>
  </div>
</section>

{% endblock %}
