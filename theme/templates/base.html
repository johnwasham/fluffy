<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}{{ config.title }}{% endblock %}</title>
  <script>
  (function(){
    var t = localStorage.getItem('fluffy-theme') ||
      (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
    document.documentElement.setAttribute('data-theme', t);
  })();
  </script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.2/css/bulma.min.css">
  <link rel="stylesheet" href="{{ config.base_url }}/static/style.css?v={{ css_version }}">
  <link rel="alternate" type="application/rss+xml" title="{{ config.title }}" href="{{ config.base_url }}/rss.xml">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.30.0/themes/prism.min.css">
  {% block head %}{% endblock %}
</head>
<body>

<nav class="navbar is-white has-shadow" role="navigation" aria-label="main navigation">
  <div class="container">
    <div class="navbar-brand">
      <a class="navbar-item has-text-weight-bold is-size-5" href="{{ config.base_url }}/">
        {{ config.title }}
      </a>
      <a role="button" class="navbar-burger" aria-label="menu" aria-expanded="false" data-target="mainNavbar">
        <span aria-hidden="true"></span>
        <span aria-hidden="true"></span>
        <span aria-hidden="true"></span>
      </a>
    </div>
    <div id="mainNavbar" class="navbar-menu">
      <div class="navbar-end">
        <a class="navbar-item" href="{{ config.base_url }}/">Home</a>
        <a class="navbar-item" href="{{ config.base_url }}/about/">About</a>
        <a class="navbar-item" href="{{ config.base_url }}/rss.xml">RSS</a>
        <span class="navbar-item" id="theme-toggle" onclick="toggleTheme()" title="Toggle dark mode" aria-label="Toggle dark mode">
          <span id="theme-icon-sun" style="display:none;">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
          </span>
          <span id="theme-icon-moon">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
          </span>
        </span>
      </div>
    </div>
  </div>
</nav>

<main>
  {% block content %}{% endblock %}
</main>

<footer class="footer mt-6">
  <div class="content has-text-centered">
    <p>
      &copy; {{ now.year }} {{ config.author }}
    </p>
  </div>
</footer>

{% block scripts %}{% endblock %}
<script>
function updateThemeToggle(theme) {
  var sun = document.getElementById('theme-icon-sun');
  var moon = document.getElementById('theme-icon-moon');
  if (!sun || !moon) return;
  if (theme === 'dark') {
    sun.style.display = '';
    moon.style.display = 'none';
  } else {
    sun.style.display = 'none';
    moon.style.display = '';
  }
}

function toggleTheme() {
  var current = document.documentElement.getAttribute('data-theme') || 'light';
  var next = current === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('fluffy-theme', next);
  updateThemeToggle(next);
}

window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function(e) {
  if (!localStorage.getItem('fluffy-theme')) {
    var theme = e.matches ? 'dark' : 'light';
    document.documentElement.setAttribute('data-theme', theme);
    updateThemeToggle(theme);
  }
});

document.addEventListener('DOMContentLoaded', () => {
  updateThemeToggle(document.documentElement.getAttribute('data-theme') || 'light');

  document.querySelectorAll('.navbar-burger').forEach(el => {
    el.addEventListener('click', () => {
      const target = document.getElementById(el.dataset.target);
      el.classList.toggle('is-active');
      target.classList.toggle('is-active');
    });
  });
});
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.30.0/components/prism-core.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.30.0/plugins/autoloader/prism-autoloader.min.js"></script>
<script>
document.querySelectorAll('.github-widget').forEach(function(el) {
  var repo = el.dataset.repo;
  fetch('https://api.github.com/repos/' + repo)
    .then(function(r) { return r.json(); })
    .then(function(d) {
      el.innerHTML =
        '<div class="github-card">' +
          '<div class="github-card-header">' +
            '<img src="{{ config.base_url }}/images/github-logo.svg" class="github-icon" alt="GitHub">' +
            '<a class="github-repo-link" href="' + d.html_url + '" target="_blank" rel="noopener">' + d.full_name + '</a>' +
          '</div>' +
          (d.description ? '<p class="github-description">' + d.description + '</p>' : '') +
          '<div class="github-stats">' +
            '<span>&#9733; ' + d.stargazers_count.toLocaleString() + '</span>' +
            '<span>&#8509; ' + d.forks_count.toLocaleString() + '</span>' +
            (d.language ? '<span>' + d.language + '</span>' : '') +
          '</div>' +
        '</div>';
    })
    .catch(function() {
      el.innerHTML = '<div class="github-card"><a href="https://github.com/' + repo + '" target="_blank" rel="noopener">' + repo + '</a></div>';
    });
});
</script>
</body>
</html>
